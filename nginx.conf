server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Serve the webapp
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve the JSON data from the mounted volume
    # The app fetches /data/lab_data.json via fetch()
    location /data/ {
        alias /data/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-store";

        # Allow the app to save data back via HTTP PUT
        dav_methods PUT;
        create_full_put_path on;
        client_max_body_size 10m;
    }
}
